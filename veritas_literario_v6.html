<!DOCTYPE html>
<html>
<head>
    <title>Veritas Literaria</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sync function
        const syncData = () => {
            const inputField = document.getElementById('dataInput');
            const dataRef = database.ref('data');

            // Synchronize data in real-time
            dataRef.on('value', (snapshot) => {
                inputField.value = snapshot.val();
            });

            // Update Firebase when input changes
            inputField.addEventListener('input', () => {
                dataRef.set(inputField.value);
            });
        };
    </script>
</head>
<body onload="syncData()">
    <h1>Welcome to Veritas Literaria</h1>
    <input type="text" id="dataInput" placeholder="Type something...">
</body>
</html>
