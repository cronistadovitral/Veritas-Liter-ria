<!DOCTYPE html>
<html>
<head>
    <title>Veritas Literaria</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYrchu-rpgo37zHngiOkU2vPo5j6p_6F0",
            authDomain: "veritas-literrio.firebaseapp.com",
            databaseURL: "veritas-literrio.firebaseapp.com",
            projectId: "veritas-literrio",
            storageBucket: "veritas-literrio.firebasestorage.app",
            messagingSenderId: "69633391598",
            appId: "1:69633391598:web:21695891e91fb73a0cecff"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sync function
        const syncData = () => {
            const inputField = document.getElementById('dataInput');
            const dataRef = database.ref('data');

            // Synchronize data in real-time
            dataRef.on('value', (snapshot) => {
                inputField.value = snapshot.val();
            });

            // Update Firebase when input changes
            inputField.addEventListener('input', () => {
                dataRef.set(inputField.value);
            });
        };
    </script>
</head>
<body onload="syncData()">
    <h1>Welcome to Veritas Literaria</h1>
    <input type="text" id="dataInput" placeholder="Type something...">
</body>
</html>
